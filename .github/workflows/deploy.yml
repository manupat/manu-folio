# ════════════════════════════════════════════════════════════════
# deploy.yml  —  Build → Push → Deploy to Cloud Run
#
# Triggers on every push to main (i.e. after a PR is merged).
#
# GCP authentication uses Workload Identity Federation — no
# long-lived service-account key files are stored in GitHub.
#
# Required GitHub Actions secrets / variables:
#   GCP_PROJECT_ID                — Google Cloud project ID
#   GCP_REGION                    — e.g. europe-west1
#   GCP_WORKLOAD_IDENTITY_PROVIDER — full WIF provider resource name
#                                    projects/<NUM>/locations/global/
#                                    workloadIdentityPools/<POOL>/
#                                    providers/<PROVIDER>
#   GCP_SERVICE_ACCOUNT           — SA email that the WIF pool can impersonate
#                                    e.g. github-deploy@<project>.iam.gserviceaccount.com
#   TF_VAR_project_id             — (optional) passed to terraform apply
# ════════════════════════════════════════════════════════════════

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual re-deploys from the GitHub UI

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

env:
  PROJECT_ID:                  "project-e4404942-6d2f-4aff-96c"
  REGION:                      "europe-west1"
  SERVICE_NAME:                manu-folio
  IMAGE_NAME:                  manu-folio
  WORKLOAD_IDENTITY_PROVIDER:  projects/614386278583/locations/global/workloadIdentityPools/manu-folio-github-pool/providers/manu-folio-github-provider
  SERVICE_ACCOUNT:             manu-folio-github-deploy@614386278583.iam.gserviceaccount.com

jobs:
  # ── Build & Push container image ────────────────────────────
  build-and-push:
    name: Build & Push image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP via Workload Identity Federation
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ env.SERVICE_ACCOUNT }}
          create_credentials_file:    true

      # Register gcloud as the Docker credential helper for AR.
      # Because the build runs in the same shell process, gcloud is reachable.
      - name: Configure Docker credential helper
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        with:
          install: true

      - name: Build and push
        id: meta
        run: |
          REPO="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}-repo/${{ env.IMAGE_NAME }}"
          SHA_TAG="${REPO}:${{ github.sha }}"
          LATEST_TAG="${REPO}:latest"
          echo "image=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          docker buildx build \
            --provenance=false \
            --cache-from type=gha \
            --cache-to   type=gha,mode=max \
            -t "${SHA_TAG}" \
            -t "${LATEST_TAG}" \
            --push \
            -f app/Dockerfile \
            app

  # ── Deploy to Cloud Run ──────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ env.SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service:    ${{ env.SERVICE_NAME }}
          region:     ${{ env.REGION }}
          image:      ${{ needs.build-and-push.outputs.image }}
          # Pass through any extra flags if needed; traffic shifts to new revision immediately
          flags: >-
            --ingress=internal-and-cloud-load-balancing
            --min-instances=0

      - name: Show deployed URL
        run: |
          echo "Deployment complete."
          echo "Cloud Run service: ${{ env.SERVICE_NAME }}"
          echo "Image: ${{ needs.build-and-push.outputs.image }}"
